<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LindaStay</title>
  <meta name="theme-color" content="#1E4D6B" />
  <meta name="description" content="LindaStay vacation rental management SaaS for villas, Airbnb hosts and holiday homes." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <script>
    (function () {
      function isBrowserConnectorNoise(value) {
        var message = String((value && value.message) || value || '');
        return message.indexOf('No Listener: tabs:outgoing.message.ready') !== -1;
      }

      window.addEventListener('unhandledrejection', function (event) {
        if (isBrowserConnectorNoise(event.reason)) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);

      window.addEventListener('error', function (event) {
        if (isBrowserConnectorNoise(event.message) || isBrowserConnectorNoise(event.error)) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);

      window.onerror = function (message, source, lineno, colno, error) {
        if (isBrowserConnectorNoise(message) || isBrowserConnectorNoise(error)) {
          return true;
        }
        return false;
      };
    })();
  </script>
  <script>
    // GitHub Pages safety guard: older app bundles may pass `/lindastay/`
    // as Framework7 `root`; Framework7 expects the DOM root instead.
    (function () {
      var framework7Ctor;
      Object.defineProperty(window, 'Framework7', {
        configurable: true,
        get: function () { return framework7Ctor; },
        set: function (Ctor) {
          if (typeof Ctor !== 'function') {
            framework7Ctor = Ctor;
            return;
          }
          framework7Ctor = function LindaStayFramework7(options) {
            if (options && typeof options.root === 'string' && options.root.charAt(0) === '/') {
              options = Object.assign({}, options, { root: '#app' });
            }
            return new Ctor(options);
          };
          framework7Ctor.prototype = Ctor.prototype;
          Object.keys(Ctor).forEach(function (key) { framework7Ctor[key] = Ctor[key]; });
        }
      });
    })();
  </script>
  <style>
    html,
    body,
    #app,
    .view-main {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@5.7.14/css/framework7.bundle.min.css">
  <link rel="stylesheet" href="css/app.css?v=20260605-1" />
</head>
<body>
  <script>
    if (window.location.pathname.endsWith('/index.html')) {
      window.history.replaceState(null, '', window.location.pathname.replace(/index\.html$/, '') + window.location.search + window.location.hash);
    }
  </script>
  <div id="app">

  <script src="js/boot.js?v=20260605-1"></script>
